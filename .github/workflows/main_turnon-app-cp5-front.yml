# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 'Build and deploy Node.js app to Azure Web App: turnon-app-cp5-front'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js version
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies and build
      run: |
        npm ci
        npm run build

    - name: Disable remote build on App Service
      uses: azure/appservice-settings@v1
      with:
        app-name: 'turnon-app-cp5-front'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_8f90d948a69247509a0409aad875dcd4 }}
        app-settings-json: |
          [
            {
              "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
              "value": "false",
              "slotSetting": false
            },
            {
              "name": "WEBSITE_RUN_FROM_PACKAGE",
              "value": "1",
              "slotSetting": false
            }
          ]

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'turnon-app-cp5-front'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_8f90d948a69247509a0409aad875dcd4 }}
        package: ./dist/turnon/browser
